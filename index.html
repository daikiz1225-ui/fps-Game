<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ink Dash - Build 0.1</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; touch-action: none; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        /* ジョイスティック（左下） */
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 2px solid #fff; pointer-events: auto; }
        #joy-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; }
        /* ジャンプボタン（右下） */
        #jump-btn { position: absolute; bottom: 50px; right: 50px; width: 80px; height: 80px; background: rgba(0,255,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; pointer-events: auto; font-size: 20px; border: 2px solid #fff; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="joy-base"><div id="joy-stick"></div></div>
        <div id="jump-btn">JUMP</div>
    </div>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
