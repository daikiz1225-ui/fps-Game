<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ink Dash - Build 0.9 (Voxel Edition)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* ジョイスティック（左手） */
        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 130px; height: 130px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid #fff; pointer-events: auto; }
        #joy-stick { position: absolute; top: 40px; left: 40px; width: 50px; height: 50px; background: #fff; border-radius: 50%; }
        
        /* ジャンプボタン（右手） */
        #jump-btn { position: absolute; bottom: 60px; right: 60px; width: 90px; height: 90px; background: rgba(0,0,0,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; pointer-events: auto; border: 3px solid #fff; -webkit-user-select: none; }
        
        /* レティクル（少し上 45%） */
        #reticle { position: absolute; top: 45%; left: 50%; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.9); border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <div id="ui">
        <div id="reticle"></div>
        <div id="joy-base"><div id="joy-stick"></div></div>
        <div id="jump-btn">JUMP</div>
    </div>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="scene.js"></script>
    <script type="module" src="map.js"></script>
    <script type="module" src="input.js"></script>
    <script type="module" src="player.js"></script>
    <script type="module" src="shot.js"></script>
    <script type="module" src="main-game.js"></script>
</body>
</html>
